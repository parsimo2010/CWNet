name: License Compliance Check
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI
 
jobs:
  license-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Run License Compliance Checker
        uses: soheilbr82/automated-license-check@v1
        with:
          # Includes both SPDX identifiers and ScanCode-style names to avoid
          # false positives from naming mismatches.
          allowed_licenses: >-
            MIT,
            mit,
            Apache-2.0,
            apache-2.0,
            BSD-2-Clause,
            bsd-simplified,
            BSD-3-Clause,
            bsd-new,
            ISC,
            isc,
            0BSD,
            bsd-zero,
            Unlicense,
            unlicense,
            CC0-1.0,
            cc0-1.0,
            Python-2.0,
            PSF-2.0,
            python,
            BlueOak-1.0.0
