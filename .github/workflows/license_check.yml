name: License Compliance Check
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI
 
jobs:
  license-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Run License Compliance Checker
        uses: soheilbr82/automated-license-check@v1
        with:
          # Adjust this list to match licenses compatible with YOUR project's license.
          # Common permissive licenses that are generally safe to include:
          allowed_licenses: >-
            MIT,
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            0BSD,
            Unlicense,
            CC0-1.0,
            Python-2.0,
            PSF-2.0,
            BlueOak-1.0.0
 
